name: 简单同步上游更新

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一凌晨2点
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史记录

      - name: 配置Git身份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/ZhuLinsen/daily_stock_analysis.git || true
          git fetch upstream

      - name: 合并上游更改
        run: |
          git checkout main
          # 尝试合并，如果冲突则以上游版本为准
          git merge upstream/main --strategy-option theirs --allow-unrelated-histories || exit 0

      - name: 推送更改
        run: git push origin main
