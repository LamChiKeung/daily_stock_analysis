name: 自动同步上游更新

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # 临时允许使用Node.js 20
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3  # 使用v3版本，更稳定
        
      - name: 配置Git身份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
      
      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/ZhuLinsen/daily_stock_analysis.git || true
          git fetch upstream
      
      - name: 合并并推送
        run: |
          git checkout main
          git merge --ff-only upstream/main || exit 0
          git push origin main
